<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f2f5; }
.card { padding:2rem; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
</style>
</head>
<body>
<div class="card">
  <h3 class="mb-3">Login</h3>
  <form method="POST">
    <input class="form-control mb-2" name="username" placeholder="Username" required>
    <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>
    <button class="btn btn-primary w-100" type="submit">Login</button>
  </form>
  <p class="mt-2">Don't have account? <a href="/register">Register</a></p>
</div>
</body>
</html>
